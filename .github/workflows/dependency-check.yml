name: Dependency & Vulnerability Check

on:
  push:
    branches: [ main, master ]
    paths: [ requirements.txt ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Monday at 2 AM UTC
  workflow_dispatch:

jobs:
  dependency-check:
    name: Check Dependencies for Vulnerabilities
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety pip-audit

    - name: Check for known vulnerabilities with Safety
      run: safety check --json --output safety-report.json
      continue-on-error: true

    - name: Audit with pip-audit
      run: pip-audit --desc --format markdown > pip-audit-report.md
      continue-on-error: true

    - name: Generate dependency report
      run: |
        pip list --format=freeze > dependencies.txt
        pip show pandas numpy requests > key-dependencies.txt

    - name: Upload reports
      uses: actions/upload-artifact@v3
      with:
        name: dependency-reports
        path: |
          safety-report.json
          pip-audit-report.md
          dependencies.txt
          key-dependencies.txt

    - name: Check critical vulnerabilities
      run: |
        if [ -f safety-report.json ]; then
          if grep -q '"is_transitive": false' safety-report.json; then
            echo "⚠️  WARNING: Direct dependency vulnerabilities found!"
            cat safety-report.json
          fi
        fi
      continue-on-error: true

  license-check:
    name: Check License Compliance
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip pip-licenses
        pip install -r requirements.txt

    - name: Generate license report
      run: pip-licenses --format=markdown --with-urls > licenses.md

    - name: Upload license report
      uses: actions/upload-artifact@v3
      with:
        name: license-report
        path: licenses.md

    - name: Check for GPL/AGPL licenses
      run: |
        pip-licenses | grep -i "GPL\|AGPL" && \
        echo "⚠️  WARNING: GPL/AGPL dependencies found. Review licensing compatibility." || \
        echo "✅ No GPL/AGPL licenses detected"
      continue-on-error: true

name: CI - Test, Lint & Security

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-timeout
        pip install -r requirements.txt

    - name: Run unit & integration tests
      run: |
        pytest tests/ -v \
          --cov=src \
          --cov=monitoring \
          --cov-report=xml \
          --cov-report=html \
          --timeout=30 \
          --tb=short
      continue-on-error: false

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Archive coverage reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

  lint:
    name: Linting & Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black isort

    - name: Check code formatting (Black)
      run: black --check src/ tests/ main.py --diff || true

    - name: Check import sorting (isort)
      run: isort --check-only src/ tests/ main.py --diff || true

    - name: Lint with flake8
      run: |
        # Stop build on syntax errors and undefined names
        flake8 src/ tests/ main.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings for now
        flake8 src/ tests/ main.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      continue-on-error: true

  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
        pip install -r requirements.txt

    - name: Run Bandit security scan
      run: bandit -r src/ main.py -f json -o bandit-report.json || true
      continue-on-error: true

    - name: Check for known vulnerabilities (Safety)
      run: safety check --json || true
      continue-on-error: true

    - name: Check for hardcoded secrets
      run: |
        if grep -r -E '(password|secret|api_key|token).*=.*["\047]' \
          --include="*.py" src/ main.py | grep -v test | grep -v example; then
          echo "⚠️  WARNING: Potential hardcoded credentials found!"
          exit 1
        else
          echo "✅ No obvious hardcoded secrets detected"
        fi
      continue-on-error: false

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json

  config-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Validate config.json structure
      run: python -c "import json; json.load(open('config.json'))" && echo "✅ config.json is valid JSON"

    - name: Check for required config keys
      run: |
        python << 'EOF'
        import json
        with open('config.json') as f:
            config = json.load(f)

        required_keys = ['live_trading', 'max_loss_per_day']
        missing = [k for k in required_keys if k not in config]

        if missing:
            print(f"❌ Missing required config keys: {missing}")
            exit(1)
        else:
            print("✅ All required config keys present")
        EOF

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, lint, security, config-validation]
    if: always()

    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.test.result }}" == "failure" ]; then
          echo "❌ Tests failed"
          exit 1
        fi
        if [ "${{ needs.security.result }}" == "failure" ]; then
          echo "❌ Security checks failed"
          exit 1
        fi
        echo "✅ All checks passed!"
